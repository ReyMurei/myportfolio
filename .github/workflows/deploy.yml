name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      # DEBUG: Check what files actually exist
      - name: Verify sonner file exists
        run: |
          echo "=== Checking src/components/ui/ ==="
          ls -la src/components/ui/ | grep -i sonner || echo "No sonner file found!"
          echo "=== Checking exact filename case ==="
          find src/components/ui -name "*sonner*" -o -name "*Sonner*"
          echo "=== Git status (check if file is tracked) ==="
          git ls-files | grep -i sonner || echo "Not tracked by git!"
      
      - name: Clear caches
        run: |
          rm -rf node_modules/.vite
          rm -rf dist
      
      - name: Install dependencies
        run: npm ci
      
      # If sonner is missing, install it
      - name: Install sonner if missing
        run: |
          if [ ! -f "src/components/ui/sonner.tsx" ] && [ ! -f "src/components/ui/sonner.jsx" ]; then
            echo "Sonner component missing, installing..."
            npx shadcn@latest add sonner -y
          fi
      
      - name: Build project
        run: npm run build
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
