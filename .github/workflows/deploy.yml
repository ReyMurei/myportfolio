name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install
      
      # DEBUG: Check if sonner file exists and show vite config
      - name: Debug file structure
        run: |
          echo "=== Checking sonner file ==="
          ls -la src/components/ui/ | grep -i sonner || echo "NOT FOUND"
          echo "=== Checking vite.config.ts ==="
          cat vite.config.ts
          echo "=== Checking tsconfig.json paths ==="
          cat tsconfig.json | grep -A 5 '"paths"'
      
      - name: Build project
        run: npm run build
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
